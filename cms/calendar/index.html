<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Calendario de emisión · Admira.tv CMS</title>
<meta name="description" content="Calendario de emisión en vivo de las pantallas DOOH del Xpacio — vista de año y de mes, qué emite cada pantalla por franjas. Admira.tv CMS.">
<link rel="icon" href="/favicon.ico">
<style>
  :root{--bg:#070b0a;--panel:#0e1714;--panel2:#13211c;--line:#1d3329;--txt:#dff5ec;--dim:#7fa595;--teal:#19e89a;--teal2:#0f7e5a;--amber:#f5b431;--amber2:#7a5a12}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--txt);font-family:ui-monospace,SFMono-Regular,Menlo,monospace;-webkit-font-smoothing:antialiased}
  a{color:var(--teal);text-decoration:none}
  header{display:flex;flex-wrap:wrap;gap:12px;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--line)}
  .brand{display:flex;align-items:center;gap:10px;font-weight:600;letter-spacing:.04em}
  .brand .dot{width:9px;height:9px;border-radius:50%;background:var(--teal);box-shadow:0 0 10px var(--teal)}
  .wrap{max-width:1180px;margin:0 auto;padding:18px 20px 60px}
  .controls{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:18px}
  select,button{background:var(--panel2);color:var(--txt);border:1px solid var(--line);border-radius:8px;padding:8px 12px;font-family:inherit;font-size:13px;cursor:pointer}
  button:hover{border-color:var(--teal2)}
  button:disabled{opacity:.3;cursor:default;border-color:var(--line)}
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:8px;overflow:hidden}
  .seg button{border:0;border-radius:0;background:var(--panel)}
  .seg button.on{background:var(--teal2);color:#fff}
  .mtitle{font-size:18px;font-weight:600;min-width:150px;text-align:center;text-transform:capitalize}
  .stats{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}
  .stat{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:8px 14px}
  .stat .k{font-size:11px;color:var(--dim)} .stat .v{font-size:22px;font-weight:600}
  /* mes */
  .dow{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;font-size:11px;color:var(--dim);text-align:center;margin-bottom:6px;text-transform:uppercase;letter-spacing:.08em}
  .cal{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
  .cell{min-height:64px;border-radius:9px;border:1px solid var(--line);background:var(--panel);padding:7px 8px;display:flex;flex-direction:column;justify-content:space-between;cursor:pointer;transition:transform .08s,border-color .12s}
  .cell:hover{border-color:var(--teal);transform:translateY(-1px)}
  .cell.out{opacity:.32;cursor:default} .cell.out:hover{transform:none;border-color:var(--line)}
  .cell.full{background:#0c241a;border-color:var(--teal2)}
  .cell.part{background:#241f0c;border-color:var(--amber2)}
  .cell.today{outline:2px solid var(--teal);outline-offset:-1px}
  .cnum{font-size:14px;font-weight:600}
  .cfoot{font-size:11px;color:var(--dim);display:flex;align-items:center;gap:4px}
  .cfoot.ok{color:var(--teal)} .cfoot.warn{color:var(--amber)}
  /* año */
  .year{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:16px}
  .ym{background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:11px 12px}
  .ym h4{margin:0 0 8px;font-size:13px;font-weight:600;text-transform:capitalize;cursor:pointer;display:flex;justify-content:space-between}
  .ym h4 .pct{color:var(--dim);font-weight:400}
  .ym h4:hover{color:var(--teal)}
  .ydow{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;font-size:9px;color:var(--dim);text-align:center;margin-bottom:3px}
  .yg{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
  .yd{aspect-ratio:1;border-radius:3px;background:var(--panel2);border:1px solid transparent;font-size:9px;display:flex;align-items:center;justify-content:center;color:var(--dim);cursor:pointer}
  .yd.full{background:#0c241a;border-color:var(--teal2);color:var(--teal)}
  .yd.part{background:#241f0c;border-color:var(--amber2);color:var(--amber)}
  .yd.today{outline:1.5px solid var(--teal);outline-offset:-1px}
  .yd.blank{background:transparent;cursor:default}
  .yd:not(.blank):hover{border-color:var(--teal)}
  /* semana */
  .wk{display:flex;flex-direction:column;gap:6px}
  .wrow{display:grid;grid-template-columns:150px repeat(7,1fr);gap:6px;align-items:stretch}
  .wh{font-size:11px;color:var(--dim);text-align:center;padding:5px 0;text-transform:capitalize}
  .wh.on{color:var(--teal)}
  .wlabel{display:flex;align-items:center;font-size:12px;font-weight:600;padding:0 10px;background:var(--panel);border:1px solid var(--line);border-radius:8px;min-height:52px}
  .wc{min-height:52px;border:1px solid var(--line);border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform .08s}
  .wc:hover{transform:translateY(-1px)}
  .wc .pc{font-size:13px;font-weight:600}
  .wc.today{outline:2px solid var(--teal);outline-offset:-1px}
  .legend{display:flex;gap:18px;flex-wrap:wrap;margin-top:18px;font-size:12px;color:var(--dim);align-items:center}
  .sw{width:13px;height:13px;border-radius:3px;display:inline-block;vertical-align:-2px;margin-right:5px}
  .note{margin-top:14px;font-size:12px;color:var(--dim);line-height:1.6}
  .loading{color:var(--dim);font-size:13px;padding:24px 0;text-align:center}
  .ov{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;padding:20px;z-index:50}
  .ov.show{display:flex}
  .modal{background:var(--panel);border:1px solid var(--line);border-radius:14px;max-width:760px;width:100%;max-height:85vh;overflow:auto;padding:18px 20px}
  .modal h3{margin:0 0 14px;font-size:16px;text-transform:lowercase} .modal h3::first-letter{text-transform:uppercase}
  .scr{margin-bottom:16px} .scr .sh{font-size:13px;font-weight:600;margin-bottom:8px;color:var(--teal)}
  .bands{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px}
  .band{background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:8px;display:flex;gap:8px;align-items:center}
  .band img{width:40px;height:40px;object-fit:cover;border-radius:5px;flex:none;background:#000}
  .band .bt{font-size:11px;color:var(--dim)} .band .bn{font-size:12px}
  .x{float:right;cursor:pointer;color:var(--dim);font-size:18px;line-height:1}
</style>
</head>
<body>
<header>
  <div class="brand"><span class="dot"></span> ADMIRA.TV · CMS · CALENDARIO DE EMISIÓN</div>
  <div><a href="/cms.html">← CMS</a> &nbsp;·&nbsp; <a href="/canal.html">Canal</a></div>
</header>
<div class="wrap">
  <div class="controls">
    <label style="font-size:12px;color:var(--dim)">Xpacio</label>
    <select id="loc"></select>
    <label style="font-size:12px;color:var(--dim)">Pantalla</label>
    <select id="scr"><option value="">Todas</option></select>
    <span class="seg"><button id="vWeek">Semana</button><button id="vMonth" class="on">Mes</button><button id="vYear">Año</button></span>
    <span style="flex:1"></span>
    <select id="yr" title="Ir al año"></select>
    <button id="prev">‹</button>
    <div class="mtitle" id="mtitle">—</div>
    <button id="next">›</button>
    <button id="today">Hoy</button>
  </div>
  <div class="stats" id="stats"></div>
  <div id="view"><div class="loading">Cargando parrilla…</div></div>
  <div class="legend">
    <span style="display:flex;align-items:center;gap:6px">Ocupación
      <span class="sw" style="background:#13211c" title="0%"></span>
      <span class="sw" style="background:#0d3527" title="&lt;15%"></span>
      <span class="sw" style="background:#0f5a3f" title="15–30%"></span>
      <span class="sw" style="background:#13885f" title="30–50%"></span>
      <span class="sw" style="background:#17b87d" title="50–75%"></span>
      <span class="sw" style="background:#1ee8a1" title="75–100%"></span>
      <span style="color:var(--dim)">más llena →</span>
    </span>
    <span><span class="sw" style="background:#13211c"></span>0% · loop de Stock</span>
    <span><span class="sw" style="background:transparent;border:2px solid var(--teal)"></span>hoy</span>
  </div>
  <div class="note" id="note"></div>
</div>

<div class="ov" id="ov"><div class="modal"><span class="x" id="mx">✕</span><h3 id="mh">Día</h3><div id="mb"></div></div></div>

<script>
const API='https://api.admira.store';
const LOCATIONS={
  'xtanco-valencia':{name:'Xtanco Valencia',circuit:'xtanco',screens:[
    {id:'xtanco-valencia-a',label:'A · Lotería'},
    {id:'xtanco-valencia-b',label:'B · Vapeo/Tabaco'},
    {id:'xtanco-valencia-c',label:'C · Bebidas'},
    {id:'xtanco-valencia-d',label:'D · Ofertas'},
  ]},
};
const BANDS=[['manana','Mañana'],['mediodia','Mediodía'],['tarde','Tarde'],['noche','Noche']];
const MONTHS=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
const DOW=['lun','mar','mié','jue','vie','sáb','dom'];
const qs=new URLSearchParams(location.search);
let locId=qs.get('loc')&&LOCATIONS[qs.get('loc')]?qs.get('loc'):'xtanco-valencia';
let scrId=qs.get('screen')||'';
let view=['week','month','year'].includes(qs.get('view'))?qs.get('view'):'month';
const MIN_YEAR=2026, MAX_YEAR=2035; // el calendario empieza en 2026 y dura 10 años
const today=new Date();
function clampCursor(){const y=cursor.getFullYear();if(y<MIN_YEAR)cursor=new Date(MIN_YEAR,0,1);else if(y>MAX_YEAR)cursor=new Date(MAX_YEAR,11,1);}
function weekStart(d){const x=new Date(d);x.setHours(0,0,0,0);x.setDate(x.getDate()-((x.getDay()+6)%7));return x;}
let cursor=new Date(today.getFullYear(),today.getMonth(),today.getDate());clampCursor();

const pad=n=>String(n).padStart(2,'0');
const ymd=d=>d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
const isToday=d=>ymd(d)===ymd(today);
const activeScreens=()=>{const L=LOCATIONS[locId];return scrId?L.screens.filter(s=>s.id===scrId):L.screens;};
const expectedPerDay=()=>activeScreens().length*4;

function fillSelectors(){
  document.getElementById('loc').innerHTML=Object.entries(LOCATIONS).map(([k,v])=>`<option value="${k}" ${k===locId?'selected':''}>${v.name}</option>`).join('');
  document.getElementById('scr').innerHTML='<option value="">Todas</option>'+LOCATIONS[locId].screens.map(s=>`<option value="${s.id}" ${s.id===scrId?'selected':''}>${s.label}</option>`).join('');
  document.getElementById('vWeek').classList.toggle('on',view==='week');
  document.getElementById('vMonth').classList.toggle('on',view==='month');
  document.getElementById('vYear').classList.toggle('on',view==='year');
  const yr=document.getElementById('yr');
  if(!yr.dataset.filled){let o='';for(let y=MIN_YEAR;y<=MAX_YEAR;y++)o+=`<option value="${y}">${y}</option>`;yr.innerHTML=o;yr.dataset.filled='1';}
}
function updateNav(){
  const y=cursor.getFullYear(),m=cursor.getMonth();
  let atMin,atMax;
  if(view==='year'){atMin=y<=MIN_YEAR;atMax=y>=MAX_YEAR;}
  else if(view==='week'){const ws=weekStart(cursor);atMin=ws<=new Date(MIN_YEAR,0,1);atMax=ws>=weekStart(new Date(MAX_YEAR,11,31));}
  else{atMin=y<MIN_YEAR||(y===MIN_YEAR&&m===0);atMax=y>MAX_YEAR||(y===MAX_YEAR&&m===11);}
  document.getElementById('prev').disabled=atMin;
  document.getElementById('next').disabled=atMax;
  document.getElementById('yr').value=String(y);
}

async function range(fromY,toY){ // own/paid/total por fecha (suma de pantallas activas) en 1 petición
  const ids=activeScreens().map(s=>s.id).join(',');
  const url=`${API}/grid/range?screens=${encodeURIComponent(ids)}&from=${ymd(fromY)}&to=${ymd(toY)}&_=${Date.now()}`;
  const map={};
  try{
    const d=await (await fetch(url,{cache:'no-store'})).json();
    Object.values(d.screens||{}).forEach(sc=>(sc.days||[]).forEach(x=>{
      const m=map[x.date]||(map[x.date]={own:0,paid:0,total:0});
      m.own+=x.own||0; m.paid+=x.paid||0; m.total+=x.total||0;
    }));
  }catch(e){}
  return map;
}
const occOf=m=>(m&&m.total)?Math.round((m.own+m.paid)/m.total*100):0;
// Heatmap: intensidad de teal según ocupación (own+vendidos / capacidad). Devuelve [bg,fg,borde].
function heat(occ){
  if(occ<=0)  return ['#13211c','var(--dim)','transparent'];
  if(occ<15)  return ['#0d3527','#8fd6bd','#15573f'];
  if(occ<30)  return ['#0f5a3f','#cdeede','#1a7e5a'];
  if(occ<50)  return ['#13885f','#eafff6','#20ad7b'];
  if(occ<75)  return ['#17b87d','#04140d','#36e6a4'];
  return        ['#1ee8a1','#04140d','#62ffc2'];
}

function monthCells(base){
  const first=new Date(base.getFullYear(),base.getMonth(),1);
  const off=(first.getDay()+6)%7;const start=new Date(first);start.setDate(first.getDate()-off);
  const cells=[];for(let i=0;i<42;i++){const d=new Date(start);d.setDate(start.getDate()+i);cells.push(d);}
  while(cells.length>35&&cells[cells.length-1].getMonth()!==base.getMonth()&&cells[cells.length-7].getMonth()!==base.getMonth())cells.splice(-7);
  return cells;
}

async function renderMonth(){
  document.getElementById('mtitle').textContent=MONTHS[cursor.getMonth()]+' '+cursor.getFullYear();
  const host=document.getElementById('view');host.innerHTML='<div class="loading">Cargando parrilla…</div>';
  const first=new Date(cursor.getFullYear(),cursor.getMonth(),1),last=new Date(cursor.getFullYear(),cursor.getMonth()+1,0);
  const data=await range(first,last);
  const cells=monthCells(cursor);
  let inMonth=0,occSum=0,emit=0,ownTot=0,paidTot=0;
  let html='<div class="dow">'+DOW.map(d=>`<div>${d}</div>`).join('')+'</div><div class="cal">';
  cells.forEach(d=>{
    const out=d.getMonth()!==cursor.getMonth();const key=ymd(d);const m=data[key]||{own:0,paid:0,total:0};const occ=occOf(m);
    let cls='cell',style='';
    if(out)cls+=' out';
    else{inMonth++;occSum+=occ;ownTot+=m.own;paidTot+=m.paid;if(occ>0)emit++;
      const[bg,fg,bd]=heat(occ);style=`background:${bg};border-color:${bd};`;
    }
    if(isToday(d))cls+=' today';
    const foot=out?'':(occ>0?`<span style="color:${heat(occ)[1]}">${occ}%</span>`:'Stock');
    const title=out?'':`${key} · ocupación ${occ}% · ${m.own} own${m.paid?' · '+m.paid+' vendidos':''}`;
    html+=`<div class="${cls}" style="${style}" ${out?'':`data-d="${key}" title="${title}"`}><div class="cnum">${d.getDate()}</div><div class="cfoot">${foot}</div></div>`;
  });
  html+='</div>';host.innerHTML=html;
  host.querySelectorAll('[data-d]').forEach(el=>el.onclick=()=>openDay(el.dataset.d));
  const avg=inMonth?Math.round(occSum/inMonth):0;
  setStats([['Xpacio',LOCATIONS[locId].name],['Ocupación media',avg+'%'],['Días con emisión',emit+' / '+inMonth],['own · vendidos',ownTot+' · '+paidTot]]);
  setNote();
}

async function renderYear(){
  const Y=cursor.getFullYear();
  document.getElementById('mtitle').textContent=Y;
  const host=document.getElementById('view');host.innerHTML='<div class="loading">Cargando el año…</div>';
  const data=await range(new Date(Y,0,1),new Date(Y,11,31));
  let yOccSum=0,yEmit=0,yDays=0;
  let html='<div class="year">';
  for(let m=0;m<12;m++){
    const first=new Date(Y,m,1),off=(first.getDay()+6)%7,dim=new Date(Y,m+1,0).getDate();
    let mOccSum=0;
    let g='';
    for(let i=0;i<off;i++)g+='<div class="yd blank"></div>';
    for(let day=1;day<=dim;day++){
      const d=new Date(Y,m,day),key=ymd(d),mm=data[key]||{own:0,paid:0,total:0},occ=occOf(mm);
      mOccSum+=occ;yOccSum+=occ;yDays++;if(occ>0)yEmit++;
      const[bg,fg,bd]=heat(occ);
      let cls='yd'+(isToday(d)?' today':'');
      const title=`${key} · ocupación ${occ}% · ${mm.own} own${mm.paid?' · '+mm.paid+' vendidos':''}`;
      g+=`<div class="${cls}" data-d="${key}" title="${title}" style="background:${bg};color:${fg};border-color:${bd}">${day}</div>`;
    }
    const mAvg=Math.round(mOccSum/dim);
    html+=`<div class="ym"><h4 data-m="${m}"><span>${MONTHS[m]}</span><span class="pct">${mAvg}%</span></h4>`+
          '<div class="ydow">'+DOW.map(x=>`<div>${x[0]}</div>`).join('')+'</div>'+
          `<div class="yg">${g}</div></div>`;
  }
  html+='</div>';host.innerHTML=html;
  host.querySelectorAll('.yd[data-d]').forEach(el=>el.onclick=()=>openDay(el.dataset.d));
  host.querySelectorAll('h4[data-m]').forEach(el=>el.onclick=()=>{cursor=new Date(Y,+el.dataset.m,1);view='month';render();});
  setStats([['Xpacio',LOCATIONS[locId].name],['Ocupación media',Math.round(yOccSum/yDays)+'%'],['Días con emisión',yEmit+' / '+yDays],['Año',Y]]);
  setNote();
}

async function renderWeek(){
  const ws=weekStart(cursor);const dates=[];for(let i=0;i<7;i++){const d=new Date(ws);d.setDate(ws.getDate()+i);dates.push(d);}
  const we=dates[6];
  const mo=m=>MONTHS[m].slice(0,3);
  document.getElementById('mtitle').textContent=`${ws.getDate()} ${mo(ws.getMonth())} – ${we.getDate()} ${mo(we.getMonth())} ${we.getFullYear()}`;
  const host=document.getElementById('view');host.innerHTML='<div class="loading">Cargando la semana…</div>';
  const screens=activeScreens();
  const ids=screens.map(s=>s.id).join(',');
  let resp={screens:{}};
  try{resp=await (await fetch(`${API}/grid/range?screens=${encodeURIComponent(ids)}&from=${ymd(ws)}&to=${ymd(we)}&_=${Date.now()}`,{cache:'no-store'})).json();}catch(e){}
  const by=resp.screens||{};const idx={};
  screens.forEach(s=>{idx[s.id]={};((by[s.id]||{}).days||[]).forEach(x=>idx[s.id][x.date]=x);});
  let html='<div class="wk"><div class="wrow"><div></div>'+
    dates.map(d=>`<div class="wh${isToday(d)?' on':''}">${DOW[(d.getDay()+6)%7]} ${d.getDate()}</div>`).join('')+'</div>';
  const agg={};
  screens.forEach(s=>{
    html+=`<div class="wrow"><div class="wlabel">${s.label}</div>`;
    dates.forEach(d=>{
      const key=ymd(d),x=idx[s.id][key]||{own:0,paid:0,total:0,occ:0},occ=x.occ||0;
      const a=agg[key]||(agg[key]={own:0,paid:0,total:0});a.own+=x.own||0;a.paid+=x.paid||0;a.total+=x.total||0;
      const[bg,fg,bd]=heat(occ);
      html+=`<div class="wc${isToday(d)?' today':''}" data-d="${key}" title="${s.label} · ${key} · ${occ}% · ${x.own||0} own${x.paid?' · '+x.paid+' vendidos':''}" style="background:${bg};color:${fg};border-color:${bd}"><span class="pc">${occ?occ+'%':'·'}</span></div>`;
    });
    html+='</div>';
  });
  let wo=0,we_=0,wOwn=0,wPaid=0;
  html+='<div class="wrow"><div class="wlabel" style="color:var(--teal)">Todas</div>';
  dates.forEach(d=>{const key=ymd(d),a=agg[key]||{own:0,paid:0,total:0},occ=occOf(a);wo+=occ;if(occ>0)we_++;wOwn+=a.own;wPaid+=a.paid;const[bg,fg,bd]=heat(occ);
    html+=`<div class="wc${isToday(d)?' today':''}" data-d="${key}" title="Todas · ${key} · ${occ}%" style="background:${bg};color:${fg};border-color:${bd}"><span class="pc">${occ?occ+'%':'·'}</span></div>`;});
  html+='</div></div>';host.innerHTML=html;
  host.querySelectorAll('[data-d]').forEach(el=>el.onclick=()=>openDay(el.dataset.d));
  setStats([['Xpacio',LOCATIONS[locId].name],['Ocupación media',Math.round(wo/7)+'%'],['Días con emisión',we_+' / 7'],['own · vendidos',wOwn+' · '+wPaid]]);
  setNote();
}
const setStats=arr=>{document.getElementById('stats').innerHTML=arr.map(([k,v])=>`<div class="stat"><div class="k">${k}</div><div class="v">${v}</div></div>`).join('');};
const setNote=()=>{document.getElementById('note').innerHTML=
  'La intensidad del color de cada día indica su <b>ocupación</b> (contenido propio + vendido sobre la capacidad de las pantallas): a más lleno, más intenso. '+
  'Una ventana rodante de un año se mantiene programada automáticamente cada madrugada; el calendario abarca 2026–2035. '+
  'Los días al 0% emiten el loop de Stock genérico. Clic en un día para ver los creativos por pantalla y franja.';};

function render(){fillSelectors();updateNav();(view==='year'?renderYear:view==='week'?renderWeek:renderMonth)();}

async function openDay(key){
  const ov=document.getElementById('ov'),mb=document.getElementById('mb');
  const d=new Date(key+'T00:00:00');
  document.getElementById('mh').textContent=d.toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  mb.innerHTML='<div class="loading">Cargando creativos…</div>';ov.classList.add('show');
  const screens=activeScreens();
  const parts=await Promise.all(screens.map(async s=>{
    let j=null;try{j=await (await fetch(`${API}/grid/day?screen=${s.id}&date=${key}&_=${Date.now()}`,{cache:'no-store'})).json();}catch(e){}
    const byBand={},seen=new Set();
    ((j&&j.bands)||[]).forEach(b=>(b.slots||[]).forEach(sl=>{if(sl.kind==='own'&&sl.creative&&!seen.has(sl.bookingId)){seen.add(sl.bookingId);byBand[b.id]=sl;}}));
    const bands=BANDS.map(([bid,blab])=>{
      const sl=byBand[bid];
      if(!sl)return `<div class="band"><div><div class="bt">${blab}</div><div class="bn" style="color:var(--dim)">— Stock</div></div></div>`;
      const u=sl.creative.url||'',img=(sl.creative.type==='image'||sl.creative.type==='animation');
      const th=img?`<img src="${u}" alt="" loading="lazy">`:`<div style="width:40px;height:40px;border-radius:5px;background:#000;display:flex;align-items:center;justify-content:center;color:var(--teal);flex:none">▶</div>`;
      return `<div class="band">${th}<div><div class="bt">${blab}</div><div class="bn">${(sl.title||'').slice(0,40)}</div></div></div>`;
    }).join('');
    return `<div class="scr"><div class="sh">${s.label}</div><div class="bands">${bands}</div></div>`;
  }));
  mb.innerHTML=parts.join('');
}

document.getElementById('mx').onclick=()=>document.getElementById('ov').classList.remove('show');
document.getElementById('ov').onclick=e=>{if(e.target.id==='ov')document.getElementById('ov').classList.remove('show');};
function step(dir){
  if(view==='year')cursor.setFullYear(cursor.getFullYear()+dir);
  else if(view==='week')cursor.setDate(cursor.getDate()+7*dir);
  else cursor.setMonth(cursor.getMonth()+dir,1);
  clampCursor();render();
}
document.getElementById('prev').onclick=()=>step(-1);
document.getElementById('next').onclick=()=>step(1);
document.getElementById('today').onclick=()=>{cursor=new Date(today.getFullYear(),today.getMonth(),today.getDate());clampCursor();render();};
document.getElementById('yr').onchange=e=>{cursor.setFullYear(+e.target.value);clampCursor();render();};
document.getElementById('vWeek').onclick=()=>{view='week';render();};
document.getElementById('vMonth').onclick=()=>{view='month';render();};
document.getElementById('vYear').onclick=()=>{view='year';render();};
document.getElementById('loc').onchange=e=>{locId=e.target.value;scrId='';render();};
document.getElementById('scr').onchange=e=>{scrId=e.target.value;render();};
render();
</script>
