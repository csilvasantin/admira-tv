<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<script src="/auth-gate.js"></script>
<!-- preconnect a orígenes críticos (CSS del chrome + backbone /grid) -->
<link rel="preconnect" href="https://api.admira.store" crossorigin>
<link rel="preconnect" href="https://www.carlossilva.info">
<link rel="dns-prefetch" href="https://api.admira.store">
<link rel="dns-prefetch" href="https://www.carlossilva.info">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lanzadera de apps · Admira.tv</title>
<meta name="description" content="La lanzadera del stack Admira: las 20 aplicaciones del ecosistema —señalización, catálogo, analítica, IoT, gemelos digitales, teambuilding y más— en un solo grid.">
<meta name="theme-color" content="#070a10">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="canonical" href="https://admira.tv/apps/">
<meta property="og:title" content="Lanzadera de apps · Admira.tv">
<meta property="og:description" content="Las 20 aplicaciones del stack Admira en un solo grid.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://admira.tv/apps/">
<meta property="og:image" content="https://admira.tv/og-admira.png">
<style>
  :root{--bg:#070a10;--panel:#0b1119;--panel2:#0e1622;--line:#1e2940;--txt:#dfe8f4;--dim:#8595ad;--green:#3df08a;--amber:#f5b431}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--txt);font-family:-apple-system,Segoe UI,Roboto,system-ui,sans-serif;line-height:1.55;-webkit-font-smoothing:antialiased}
  body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;background:repeating-linear-gradient(0deg,rgba(255,255,255,.012) 0 1px,transparent 1px 3px);opacity:.5}
  a{color:inherit;text-decoration:none}
  .wrap{position:relative;z-index:1;max-width:1120px;margin:0 auto;padding:26px 20px 64px}
  .lhead h1{font-size:clamp(24px,4vw,34px);margin:0 0 6px;letter-spacing:-.01em;font-weight:800}
  .lhead .lead{color:var(--dim);margin:0 0 20px;max-width:640px;font-size:15px}
  /* buscador reubicado en la barra superior del chrome (cfg.topRight) — compacto, coherente con la topbar */
  .admtop .admsearch{position:relative;display:flex;align-items:center;flex:0 1 260px;min-width:150px;margin:0 2px}
  /* móvil: el buscador cede ancho (se estrecha) para que TODOS los controles del chrome quepan en una fila, sin scroll horizontal */
  @media(max-width:760px){.admtop .admsearch{flex:1 1 auto;min-width:72px;margin-left:0}}
  .admtop .admsearch svg{position:absolute;left:9px;width:15px;height:15px;color:#8595ad;pointer-events:none}
  .admtop .admsearch input{width:100%;background:#0e1420;color:#cdd8e8;border:1px solid #1e2940;border-radius:9px;padding:6px 10px 6px 30px;font:13px -apple-system,Segoe UI,Roboto,sans-serif;height:32px}
  .admtop .admsearch input:focus{outline:none;border-color:#3df08a;box-shadow:0 0 0 3px rgba(61,240,138,.14)}
  .admtop .admsearch input::placeholder{color:#8595ad}
  .admtop .admsearch input::-webkit-search-cancel-button{filter:invert(.6)}
  /* barra de herramientas de la página: solo contadores */
  .tools{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:18px}
  .counts{display:flex;gap:14px;font:600 12px ui-monospace,monospace;color:var(--dim);white-space:nowrap}
  .counts b{color:var(--txt)}
  .counts .live::before{content:"\25CF";color:var(--green);margin-right:5px;font-size:10px;vertical-align:1px}
  .counts .wip::before{content:"\25CB";color:var(--amber);margin-right:5px;font-size:10px;vertical-align:1px}
  /* grid de apps */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(186px,1fr));gap:14px}
  .app{position:relative;display:flex;flex-direction:column;gap:9px;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px 15px 15px;transition:transform .13s,border-color .2s,background .2s}
  .app:hover{transform:translateY(-3px);border-color:#2a3a66;background:var(--panel2)}
  .app:focus-visible{outline:2px solid var(--green);outline-offset:2px}
  .app .ic{position:relative;width:44px;height:44px;display:grid;place-items:center;border-radius:11px;background:rgba(61,240,138,.07);border:1px solid rgba(61,240,138,.16);transition:background .2s,border-color .2s,box-shadow .2s}
  .app .ic svg{width:26px;height:26px;color:var(--green);filter:drop-shadow(0 0 3px rgba(61,240,138,.5))}
  .app:hover .ic svg{filter:drop-shadow(0 0 6px rgba(61,240,138,.85))}
  .app .nm{font-weight:700;font-size:15px;line-height:1.2}
  .app .en{font:600 10.5px ui-monospace,monospace;color:var(--dim);letter-spacing:.02em;margin-top:-4px}
  .app .ds{color:var(--dim);font-size:12.5px;line-height:1.45;flex:1}
  .app .st{display:inline-flex;align-items:center;gap:5px;font:600 10.5px ui-monospace,monospace;letter-spacing:.02em;margin-top:2px}
  .app .st .d{width:7px;height:7px;border-radius:50%;flex:none}
  .app .st.live{color:var(--green)} .app .st.live .d{background:var(--green);box-shadow:0 0 6px var(--green)}
  .app .st.wip{color:var(--amber)} .app .st.wip .d{background:transparent;border:1.5px solid var(--amber)}
  /* botones de material por tarjeta (vídeo + PDF) — solo aparecen si el manifest los trae */
  .app .acts{display:flex;gap:7px;margin-top:8px}
  .app .act{appearance:none;display:inline-flex;align-items:center;gap:5px;background:#0e1420;color:var(--dim);border:1px solid var(--line);border-radius:8px;padding:4px 9px;font:600 10.5px ui-monospace,monospace;letter-spacing:.02em;cursor:pointer;transition:color .15s,border-color .15s}
  .app .act:hover{color:var(--green);border-color:#2a3a66}
  .app .act:focus-visible{outline:2px solid var(--green);outline-offset:2px}
  .app .act svg{width:12px;height:12px;flex:none}
  .empty{color:var(--dim);font-size:14px;padding:30px 4px;text-align:center;display:none}
  .foot{margin-top:34px;padding-top:16px;border-top:1px solid var(--line);color:var(--dim);font:600 11.5px ui-monospace,monospace;display:flex;justify-content:space-between;gap:14px;flex-wrap:wrap}
  .foot a{color:var(--dim)} .foot a:hover{color:var(--green)}
  /* ── Vídeo explicativo (hover ≥3s / focus ≥3s / long-press ≥600ms sobre el icono) ── */
  /* Anillo de progreso que se rellena en 3s; se activa solo en iconos con vídeo en el manifest. */
  .app .ic.has-video{cursor:pointer}
  .app .ic .armring{position:absolute;inset:0;width:100%;height:100%;transform:rotate(-90deg);pointer-events:none;opacity:0;transition:opacity .15s ease}
  .app .ic .armring circle{fill:none;stroke-width:2}
  .app .ic .armring .track{stroke:rgba(61,240,138,.12)}
  .app .ic .armring .prog{stroke:var(--green);stroke-linecap:round;stroke-dasharray:131.95;stroke-dashoffset:131.95;filter:drop-shadow(0 0 4px rgba(61,240,138,.6))}
  .app .ic.arming{background:rgba(61,240,138,.13);border-color:rgba(61,240,138,.42);box-shadow:0 0 12px rgba(61,240,138,.28)}
  .app .ic.arming .armring{opacity:1}
  .app .ic.arming .armring .prog{animation:armfill 3s linear forwards}
  @keyframes armfill{to{stroke-dashoffset:0}}
  /* overlay modal del vídeo */
  .vov{position:fixed;inset:0;z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;background:rgba(3,6,12,.74);backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);animation:vfade .18s ease}
  .vov .vbox{width:min(920px,92vw);max-width:100%;background:var(--panel);border:1px solid var(--line);border-radius:14px;overflow:hidden;box-shadow:0 24px 70px rgba(0,0,0,.6);animation:vpop .2s ease}
  .vov .vbar{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:11px 14px;border-bottom:1px solid var(--line)}
  .vov .vtitle{font-weight:700;font-size:14px;line-height:1.3}
  .vov .vclose{appearance:none;background:#0e1420;color:var(--dim);border:1px solid var(--line);border-radius:8px;width:30px;height:30px;font-size:14px;cursor:pointer;line-height:1;display:grid;place-items:center;flex:none}
  .vov .vclose:hover{color:var(--green);border-color:#2a3a66}
  .vov .vclose:focus-visible{outline:2px solid var(--green);outline-offset:2px}
  .vov .vdl{display:inline-flex;align-items:center;gap:6px;background:#0e1420;color:var(--dim);border:1px solid var(--line);border-radius:8px;padding:0 10px;height:30px;font:600 11px ui-monospace,monospace;flex:none;margin-left:auto}
  .vov .vdl:hover{color:var(--green);border-color:#2a3a66}
  .vov .vdl:focus-visible{outline:2px solid var(--green);outline-offset:2px}
  .vov .vdl svg{width:12px;height:12px}
  .vov .vvid{display:block;width:100%;max-height:78vh;background:#000}
  @keyframes vfade{from{opacity:0}to{opacity:1}}
  @keyframes vpop{from{opacity:0;transform:translateY(8px) scale(.98)}to{opacity:1;transform:none}}
  /* Movimiento reducido: sin anillo animado (indicador estático) ni animación del overlay. */
  @media (prefers-reduced-motion: reduce){
    .app .ic.arming .armring .prog{animation:none;stroke-dashoffset:0}
    .vov,.vov .vbox{animation:none}
  }
</style>
</head>
<body>
<script>
window.ADMIRA_VERSION='v.09.07.2026.r28';
/* El buscador de la lanzadera vive en la barra superior del chrome (cfg.topRight).
   No lleva clase .admtR, así que NO lo esconde el breakpoint móvil de la topbar. */
window.ADMIRA_NAV={
  topRight:
    '<span class="admsearch">'+
      '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true" focusable="false"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.2-3.2"/></svg>'+
      '<input id="q" type="search" placeholder="Buscar app…" aria-label="Buscar aplicación" autocomplete="off">'+
    '</span>'
};
</script>
<script src="/admira-nav.js?v=08.07.2026.r25" data-active="apps" data-title="Lanzadera de apps" defer></script>

<main class="wrap" id="admskip-target">
  <div class="grid" id="grid" role="list"></div>
  <p class="empty" id="empty">Sin resultados para tu búsqueda.</p>

  <div class="foot">
    <span>Réplica mejorada de la lanzadera legacy · new.admira.mobi → admira.tv</span>
    <span>Admira · tv · <span style="opacity:.75">v.09.07.2026.r28</span></span>
  </div>
</main>

<script>
(function(){
  // Las 18 apps y su estado ●/○ viven en window.AdmiraApps (admira-nav.js) — FUENTE ÚNICA que
  // comparten esta lanzadera y el submenú del sidebar. Al encender una app se cambia allí, no aquí.
  var APPS=[];
  var esc=function(x){return String(x==null?'':x).replace(/[<>&"]/g,function(c){return {'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c];});};
  function icon(slug){ try{ return (window.AdmiraIcon&&window.AdmiraIcon(slug))||''; }catch(_){ return ''; } }
  function stTxt(st){ return st==='live'?'En antena':'En construcción'; }
  function render(){
    var grid=document.getElementById('grid');
    grid.innerHTML=APPS.map(function(a){
      var key=(a.nm+' '+a.en+' '+a.ds).toLowerCase();
      return '<a class="app" role="listitem" href="/'+a.s+'/" data-key="'+esc(key)+'" data-slug="'+esc(a.s)+'" '+
        'aria-label="'+esc(a.nm)+' — '+esc(stTxt(a.st))+'">'+
        '<span class="ic">'+icon(a.s)+'</span>'+
        '<span class="nm">'+esc(a.nm)+'</span>'+
        '<span class="en">'+esc(a.en)+'</span>'+
        '<span class="ds">'+esc(a.ds)+'</span>'+
        '<span class="st '+a.st+'"><span class="d"></span>'+esc(stTxt(a.st))+'</span>'+
      '</a>';
    }).join('');
  }
  function filter(){
    var q=(document.getElementById('q').value||'').trim().toLowerCase();
    var n=0, cards=document.querySelectorAll('.app');
    cards.forEach(function(c){ var hit=!q||c.getAttribute('data-key').indexOf(q)>=0; c.style.display=hit?'':'none'; if(hit)n++; });
    document.getElementById('empty').style.display=n?'none':'block';
  }
  /* ── Vídeo explicativo por icono ────────────────────────────────────────────
     Manifest apps/videos.json: {"<slug>":{"src":"/apps/video/<slug>.mp4","title":"…"}}.
     La feature SOLO existe para slugs presentes en el manifest; si está vacío o el
     fetch falla → CERO efecto (la lanzadera queda idéntica). */
  var VIDEOS={};
  var HOVER_MS=3000, TOUCH_MS=600;
  var RING_SVG='<svg class="armring" viewBox="0 0 44 44" aria-hidden="true" focusable="false">'+
    '<circle class="track" cx="22" cy="22" r="21"></circle>'+
    '<circle class="prog" cx="22" cy="22" r="21"></circle></svg>';
  var PLAY_SVG='<svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true" focusable="false"><path d="M8 5.5v13l11-6.5z"/></svg>';
  var DL_SVG='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false"><path d="M12 4v11m0 0 4-4m-4 4-4-4M5 19h14"/></svg>';
  var armTimer=null, armIc=null;
  var overlayEl=null, keyHandler=null, lastFocus=null;

  function hasManifest(){ try{ return VIDEOS && Object.keys(VIDEOS).length>0; }catch(_){ return false; } }
  function reduceMotion(){ return !!(window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches); }

  function clearArm(){
    if(armTimer){ clearTimeout(armTimer); armTimer=null; }
    if(armIc){ armIc.classList.remove('arming'); armIc=null; }
  }
  function startArm(ic, slug, ms){
    if(!VIDEOS[slug] || overlayEl) return;
    clearArm();
    armIc=ic;
    ic.classList.remove('arming');
    void ic.offsetWidth;            // reflow → reinicia la animación del anillo
    ic.classList.add('arming');
    armTimer=setTimeout(function(){ clearArm(); openVideo(slug); }, ms);
  }

  function openVideo(slug){
    var v=VIDEOS[slug]; if(!v || !v.src) return;
    clearArm();
    if(overlayEl) closeVideo();
    lastFocus=document.activeElement;
    var title=v.title||slug, reduce=reduceMotion();
    overlayEl=document.createElement('div');
    overlayEl.className='vov';
    overlayEl.setAttribute('role','dialog');
    overlayEl.setAttribute('aria-modal','true');
    overlayEl.setAttribute('aria-label', title);
    overlayEl.innerHTML=
      '<div class="vbox">'+
        '<div class="vbar">'+
          '<span class="vtitle">'+esc(title)+'</span>'+
          '<a class="vdl" href="'+esc(v.src)+'" download>'+DL_SVG+'Descargar</a>'+
          '<button type="button" class="vclose" aria-label="Cerrar vídeo">✕</button>'+
        '</div>'+
        '<video class="vvid" controls playsinline preload="metadata"'+(reduce?'':' autoplay')+'></video>'+
      '</div>';
    document.body.appendChild(overlayEl);
    var vid=overlayEl.querySelector('.vvid');
    var closeBtn=overlayEl.querySelector('.vclose');
    var dlBtn=overlayEl.querySelector('.vdl');
    vid.src=v.src;
    closeBtn.addEventListener('click', closeVideo);
    // click en el fondo oscuro (fuera de la caja) cierra
    overlayEl.addEventListener('click', function(e){ if(e.target===overlayEl) closeVideo(); });
    // Escape + foco atrapado (role=dialog aria-modal)
    keyHandler=function(e){
      if(e.key==='Escape'){ e.preventDefault(); closeVideo(); return; }
      if(e.key==='Tab'){
        var f=[dlBtn, closeBtn, vid], i=f.indexOf(document.activeElement);
        if(e.shiftKey){ if(i<=0){ e.preventDefault(); f[f.length-1].focus(); } }
        else if(i===f.length-1 || i===-1){ e.preventDefault(); f[0].focus(); }
      }
    };
    document.addEventListener('keydown', keyHandler, true);
    closeBtn.focus();
  }

  function closeVideo(){
    if(!overlayEl) return;
    var vid=overlayEl.querySelector('.vvid');
    try{ vid.pause(); vid.removeAttribute('src'); vid.load(); }catch(_){/* liberar el buffer */}
    if(keyHandler){ document.removeEventListener('keydown', keyHandler, true); keyHandler=null; }
    overlayEl.remove(); overlayEl=null;
    if(lastFocus && lastFocus.focus){ try{ lastFocus.focus(); }catch(_){/* pudo desaparecer */} }
    lastFocus=null;
  }

  function wireVideos(){
    if(!hasManifest()) return;   // manifest vacío/caído → no tocar nada
    document.querySelectorAll('.app').forEach(function(card){
      var slug=card.getAttribute('data-slug');
      var m=slug && VIDEOS[slug];
      if(!m) return;
      var ic=card.querySelector('.ic');
      if(!ic) return;
      if(m.src){
        ic.classList.add('has-video');
        if(!ic.querySelector('.armring')) ic.insertAdjacentHTML('beforeend', RING_SVG);
        // ratón: hover continuado sobre el ICONO
        ic.addEventListener('mouseenter', function(){ startArm(ic, slug, HOVER_MS); });
        ic.addEventListener('mouseleave', clearArm);
        // teclado: foco sostenido en la tarjeta arma igual
        card.addEventListener('focus', function(){ startArm(ic, slug, HOVER_MS); });
        card.addEventListener('blur', clearArm);
        // táctil: long-press ≥600ms sobre el icono, sin romper el tap que navega
        var tTimer=null, lpFired=false;
        ic.addEventListener('touchstart', function(){
          lpFired=false;
          tTimer=setTimeout(function(){ tTimer=null; lpFired=true; openVideo(slug); }, TOUCH_MS);
        }, {passive:true});
        var cancelTouch=function(){ if(tTimer){ clearTimeout(tTimer); tTimer=null; } };
        ic.addEventListener('touchmove', cancelTouch, {passive:true});
        ic.addEventListener('touchcancel', cancelTouch, {passive:true});
        ic.addEventListener('touchend', function(e){
          cancelTouch();
          if(lpFired){ e.preventDefault(); }   // suprime el click→navegación sintético
        }, {passive:false});
        // red de seguridad: si armó el long-press, bloquea la navegación de la tarjeta
        card.addEventListener('click', function(e){
          if(lpFired){ e.preventDefault(); e.stopPropagation(); lpFired=false; }
        }, true);
      }
      // ── Botones de material (vídeo + PDF) al pie de la tarjeta ──
      // La tarjeta es un <a>, así que van como <button> y cortan la navegación.
      var acts=document.createElement('span');
      acts.className='acts';
      if(m.src){
        var vb=document.createElement('button');
        vb.type='button'; vb.className='act';
        vb.setAttribute('aria-label','Ver vídeo: '+(m.title||slug));
        vb.innerHTML=PLAY_SVG+'Vídeo';
        vb.addEventListener('click', function(e){ e.preventDefault(); e.stopPropagation(); openVideo(slug); });
        acts.appendChild(vb);
      }
      if(m.pdf){
        var pb=document.createElement('button');
        pb.type='button'; pb.className='act';
        pb.setAttribute('aria-label','Descargar PDF: '+(m.title||slug));
        pb.innerHTML=DL_SVG+'PDF';
        // /apps/pdf/ responde attachment → descarga sin salir de la lanzadera
        pb.addEventListener('click', function(e){ e.preventDefault(); e.stopPropagation(); location.href=m.pdf; });
        acts.appendChild(pb);
      }
      if(acts.childNodes.length) card.appendChild(acts);
    });
  }

  function loadManifest(){
    return fetch('/apps/videos.json',{cache:'no-store'})
      .then(function(r){ return r.ok ? r.json() : {}; })
      .then(function(j){ VIDEOS=(j && typeof j==='object') ? j : {}; })
      .catch(function(){ VIDEOS={}; });
  }

  function boot(){
    // admira-nav.js (defer) ya corrió → window.AdmiraApps disponible antes de este DOMContentLoaded
    APPS=(window.AdmiraApps||[]).slice();
    render();
    var q=document.getElementById('q');
    q.addEventListener('input',filter);
    // atajo "/" enfoca la búsqueda (sin romper los atajos m/d del chrome)
    document.addEventListener('keydown',function(e){
      if(e.key==='/'&&document.activeElement!==q){ var t=e.target,tag=(t&&t.tagName||'').toLowerCase();
        if(tag!=='input'&&tag!=='textarea'&&!(t&&t.isContentEditable)){ e.preventDefault(); q.focus(); } }
    });
    // vídeo explicativo: cargar manifest y, si trae algo, cablear los iconos
    loadManifest().then(function(){ if(hasManifest()) wireVideos(); });
  }
  // los iconos los sirve admira-nav.js (window.AdmiraIcon), que es defer → ya está listo en DOMContentLoaded
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',boot); else boot();
})();
</script>
</body>
</html>
