# admira.tv — Cloudflare Pages (proyecto admira-tv).
# El site estático vive en la raíz del repo; las Pages Functions en ./functions.
name = "admira-tv"
compatibility_date = "2024-09-23"
pages_build_output_dir = "."

# KV de captura de leads del formulario de ADcelerate (/lead → LEADS).
# COMPARTIDO con admira-adstack (mismo namespace): un solo pool de leads.
[[kv_namespaces]]
binding = "LEADS"
id = "d92799da39b343f6aebd8aff2be66b21"

# KV de Acceso (Access Control v2 → /accesscontrol/api/* → ACCESS).
# Gestión de permisos v2 de todo el grupo; doc "acl:v2" + "audit:v2".
[[kv_namespaces]]
binding = "ACCESS"
id = "e909a0bea0b34997bdef34bcd012c16f"

# R2 de los vídeos explicativos de la lanzadera (/apps → hover ≥3s sobre el icono).
# La Pages Function functions/apps/video/[file].js sirve GET /apps/video/<slug>.mp4
# desde aquí, con soporte de Range. Sube cada vídeo con:
#   wrangler r2 object put admira-app-videos/<slug>.mp4 --file <slug>.mp4 --remote
[[r2_buckets]]
binding = "VIDEOS"
bucket_name = "admira-app-videos"

# Secretos (se fijan con `wrangler pages secret put <NOMBRE> --project-name admira-tv`):
#   TG_TOKEN     — token del bot de Telegram (Neo) para notificar leads
#   TG_CHAT      — chat_id del grupo AgoraMatrix
#   LEADS_ADMIN  — token para leer/borrar /leads
# Los VALORES viven en la bóveda admira-vault (secret get ...), nunca aquí.
