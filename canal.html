<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admira.tv · Digital Signage Loop</title>
<meta name="description" content="Canal de cartelería vertical de Admira.tv: emite en bucle los últimos vídeos creados en Pixeria, en un MUPI DOOH.">
<style>
  :root{ --air:#ff4444; --grn:#39d353; --blue:#7db8ff; --bg:#05080c; }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; background:var(--bg); color:var(--grn); font-family:ui-monospace,"JetBrains Mono",monospace; overflow:hidden; }
  #wrap{ position:fixed; inset:0; display:grid; place-items:center; }
  /* MUPI vertical 9:16 con bisel */
  #mupi{ position:relative; height:96vh; aspect-ratio:9/16; max-width:96vw; background:#000; border-radius:16px; overflow:hidden;
    box-shadow:0 0 0 8px #11161d, 0 0 0 10px #060a0f, 0 30px 90px rgba(0,0,0,.65), 0 0 80px rgba(125,184,255,.07); }
  #stage{ position:absolute; inset:0; display:grid; place-items:center; background:#000; }
  #stage video{ width:100%; height:100%; object-fit:cover; display:block; }
  .empty{ opacity:.5; letter-spacing:.22em; text-align:center; padding:24px; animation:blink 1.5s steps(2) infinite; }
  @keyframes blink{ 50%{ opacity:.15 } }
  /* cabecera */
  #top{ position:absolute; left:0; right:0; top:0; z-index:3; padding:18px 18px 30px; display:flex; justify-content:space-between; align-items:flex-start;
    background:linear-gradient(180deg,rgba(0,0,0,.8),transparent); }
  #top .brand{ font-weight:800; letter-spacing:.02em; font-size:19px; color:#e7f0ff; text-shadow:0 0 12px rgba(125,184,255,.55); }
  #top .brand b{ color:var(--air); }
  #top .sub{ font-size:9px; letter-spacing:.26em; color:var(--blue); opacity:.9; margin-top:3px; }
  #top .clock{ font-size:11px; color:#c8ffd0; opacity:.7; font-variant-numeric:tabular-nums; }
  /* hud inferior */
  #hud{ position:absolute; left:0; right:0; bottom:0; z-index:3; padding:26px 18px 16px;
    background:linear-gradient(0deg,rgba(0,0,0,.88),transparent); }
  #hud .now{ font-size:14px; color:#eafff0; text-shadow:0 0 6px var(--grn); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  #hud .line{ display:flex; justify-content:space-between; gap:12px; font-size:10px; letter-spacing:.1em; margin-top:9px; color:#7dff9e; opacity:.85; }
  #hud .live{ color:var(--air); }
  #hud .live::before{ content:"●"; margin-right:5px; animation:pulse 1.3s infinite; }
  @keyframes pulse{ 50%{ opacity:.25 } }
  /* barra de progreso del spot */
  #bar{ position:absolute; left:0; bottom:0; height:3px; width:0; background:var(--air); z-index:4; box-shadow:0 0 8px var(--air); transition:width .25s linear; }
  /* scanlines CRT */
  #mupi::after{ content:""; position:absolute; inset:0; z-index:5; pointer-events:none;
    background:repeating-linear-gradient(180deg,rgba(255,255,255,.025) 0 1px,transparent 1px 3px); }
  /* aviso de autoplay (algunos navegadores piden gesto) */
  #tap{ position:absolute; inset:0; z-index:6; display:none; place-items:center; background:rgba(0,0,0,.6); cursor:pointer;
    font-size:13px; letter-spacing:.12em; color:#eafff0; text-align:center; }
  #tap.show{ display:grid; }
</style>
</head>
<body>
<div id="wrap"><div id="mupi">
  <div id="top">
    <div><div class="brand">ADMIRA<b>.TV</b></div><div class="sub">DIGITAL SIGNAGE LOOP</div></div>
    <div class="clock" id="clock">--:--</div>
  </div>
  <div id="stage"><div class="empty">// cargando feed de pixeria…</div></div>
  <div id="bar"></div>
  <div id="tap">▶ Toca para arrancar el canal</div>
  <div id="hud">
    <div class="now" id="now">// inicializando</div>
    <div class="line"><span id="meta">feed: pixer-eleven · stock</span><span class="live" id="live">conectando</span></div>
  </div>
</div></div>

<script>
// Canal de cartelería vertical: coge los últimos vídeos del Stock de Pixeria
// (índice público R2, CORS abierto) y los emite en bucle en este MUPI.
const INDEX = 'https://pub-bf043a4daa3b43b7a0b769617729d074.r2.dev/stock/index.json';
const REFRESH_MS = 30000;   // re-consulta el feed cada 30s (entran vídeos nuevos)
const MAX = 12;             // últimos N vídeos en rotación

let playlist = [], idx = 0, seen = '';
const stage = document.getElementById('stage'), nowEl = document.getElementById('now'),
      liveEl = document.getElementById('live'), metaEl = document.getElementById('meta'),
      bar = document.getElementById('bar'), tap = document.getElementById('tap');

function clock(){ const d=new Date(); document.getElementById('clock').textContent =
  String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0'); }
clock(); setInterval(clock,1000);
function setLive(t,ok){ liveEl.textContent=t; liveEl.style.color = ok?'var(--air)':'#ff8e3c'; }

async function loadFeed(){
  try{
    const r = await fetch(INDEX + '?t=' + Date.now(), { cache:'no-store' });
    const d = await r.json();
    const items = d.items || (Array.isArray(d) ? d : []);
    let vids = items.filter(i => i && (i.type==='video' || i.type==='animation') && i.url);
    vids.sort((a,b) => String(b.createdAt||'').localeCompare(String(a.createdAt||'')));
    vids = vids.slice(0, MAX);
    if(!vids.length){ setLive('feed vacío', false); return; }
    const ids = vids.map(v=>v.id).join(',');
    if(ids !== seen){
      seen = ids; playlist = vids;
      setLive('LIVE · ' + vids.length + ' en loop', true);
      if(!stage.querySelector('video')){ idx = 0; playNext(); }  // arranca si está parado
    }
  }catch(e){ setLive('offline', false); }
}

function playNext(){
  if(!playlist.length){ stage.innerHTML = '<div class="empty">// sin vídeos en el feed</div>'; return; }
  const it = playlist[idx % playlist.length]; idx++;
  const v = document.createElement('video');
  v.src = it.url; v.muted = true; v.autoplay = true; v.playsInline = true; v.preload = 'auto';
  v.onended = playNext;
  v.onerror = () => setTimeout(playNext, 600);
  v.ontimeupdate = () => { if(v.duration) bar.style.width = (v.currentTime / v.duration * 100) + '%'; };
  stage.innerHTML = ''; bar.style.width = '0'; stage.appendChild(v);
  v.play().then(() => tap.classList.remove('show')).catch(() => tap.classList.add('show'));
  nowEl.textContent = '▶ ' + ((it.title || it.prompt || 'sin título').replace(/\n/g,' ').slice(0,64));
  metaEl.textContent = 'feed: pixer-eleven · ' + ((idx-1) % playlist.length + 1) + '/' + playlist.length + ' · ' + (it.motor || 'stock');
}

// fallback de autoplay: si el navegador exige gesto, un toque arranca
tap.addEventListener('click', () => { const v = stage.querySelector('video'); if(v) v.play().catch(()=>{}); tap.classList.remove('show'); });

loadFeed();
setInterval(loadFeed, REFRESH_MS);
</script>
</body>
</html>
