<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sin conexión · Admira.tv</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <meta name="robots" content="noindex">
  <style>
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;background:#070a10;color:#e8eef6;font-family:-apple-system,Segoe UI,Roboto,system-ui,sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 22px;gap:6px}
    body::before{content:"";position:fixed;inset:0;pointer-events:none;background:repeating-linear-gradient(0deg,rgba(255,255,255,.012) 0 1px,transparent 1px 3px);opacity:.6}
    .nosig{position:relative;display:inline-flex;align-items:center;gap:9px;border:1px solid #ff4444;color:#ff4444;border-radius:999px;padding:6px 14px;font-family:ui-monospace,monospace;font-size:12px;letter-spacing:.16em;text-transform:uppercase;font-weight:700;margin-bottom:8px}
    .nosig .dot{width:9px;height:9px;border-radius:50%;background:#ff4444}
    h1{position:relative;font-size:clamp(24px,5vw,38px);margin:8px 0 2px;font-weight:800}
    p{position:relative;margin:0 0 22px;color:#aab6c6;max-width:460px}
    a{position:relative;display:inline-flex;align-items:center;gap:8px;border-radius:999px;padding:11px 20px;font-weight:700;font-size:14px;text-decoration:none;border:1px solid #ff4444;background:#ff4444;color:#190406}
  </style>
</head>
<body>
  <span class="nosig"><span class="dot"></span>Sin conexión</span>
  <h1>Estás sin conexión</h1>
  <p>No hay red ahora mismo. Cuando vuelvas a tener conexión, Admira.tv seguirá en antena.</p>
  <a href="/" onclick="location.reload();return false;">↻ Reintentar</a>
</body>
</html>
