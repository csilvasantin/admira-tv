<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admira · CMS — Control de flota</title>
<meta name="description" content="CMS de Admira.tv: qué dispositivos están conectados y qué están emitiendo en tiempo real.">
<style>
  :root{ --bg:#070a10; --panel:#0e131c; --panel2:#121a27; --line:#1e2940; --ink:#cdd8e8; --dim:#8595ad;
         --air:#39d98a; --off:#ff5a5a; --amber:#ffb44c; --accent:#7aa2ff; --robot:#c08bff; }
  *{box-sizing:border-box}
  body{margin:0;background:radial-gradient(1200px 600px at 70% -10%,#11203a33,transparent),var(--bg);
       color:var(--ink);font:14px/1.45 -apple-system,Segoe UI,Roboto,sans-serif;min-height:100vh}
  header{position:sticky;top:0;z-index:5;display:flex;align-items:center;gap:14px;flex-wrap:wrap;
         padding:14px 20px;background:#070a10e6;backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
  .brand{font-weight:800;letter-spacing:.5px;font-size:18px}
  .brand b{color:var(--accent)}
  .sub{color:var(--dim);font-size:12px}
  .spacer{flex:1}
  .live{display:flex;align-items:center;gap:7px;font:600 12px ui-monospace,monospace;color:var(--dim)}
  .live .dot{width:8px;height:8px;border-radius:50%;background:var(--air);box-shadow:0 0 8px var(--air);animation:pulse 1.6s infinite}
  @keyframes pulse{50%{opacity:.4}}
  .kpis{display:flex;gap:12px;flex-wrap:wrap;padding:18px 20px 4px}
  .kpi{flex:1;min-width:130px;background:linear-gradient(180deg,var(--panel2),var(--panel));border:1px solid var(--line);
       border-radius:14px;padding:14px 16px}
  .kpi .n{font:800 28px ui-monospace,monospace;line-height:1}
  .kpi .l{color:var(--dim);font-size:12px;margin-top:4px;text-transform:uppercase;letter-spacing:.6px}
  .kpi.air .n{color:var(--air)} .kpi.amber .n{color:var(--amber)} .kpi.accent .n{color:var(--accent)}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px;padding:14px 20px 40px}
  .card{background:linear-gradient(180deg,var(--panel2),var(--panel));border:1px solid var(--line);border-radius:16px;
        overflow:hidden;display:flex;flex-direction:column}
  .card .top{display:flex;align-items:center;gap:10px;padding:13px 15px;border-bottom:1px solid var(--line)}
  .ava{width:38px;height:38px;border-radius:10px;display:grid;place-items:center;font-size:20px;
       background:#0c1320;border:1px solid var(--line);flex:none}
  .ava.robot{border-color:#5a3c8a;color:var(--robot)}
  .nm{font-weight:700;font-size:15px;line-height:1.15}
  .meta{color:var(--dim);font-size:11.5px;margin-top:1px}
  .st{margin-left:auto;display:flex;align-items:center;gap:6px;font:700 11px ui-monospace,monospace;
      padding:4px 9px;border-radius:999px;border:1px solid var(--line);white-space:nowrap}
  .st .d{width:8px;height:8px;border-radius:50%}
  .st.on{color:var(--air);border-color:#1f5e44} .st.on .d{background:var(--air);box-shadow:0 0 7px var(--air)}
  .st.off{color:var(--off);border-color:#5e2630} .st.off .d{background:var(--off)}
  .body{padding:13px 15px;display:flex;flex-direction:column;gap:11px;flex:1}
  .now{display:flex;align-items:center;gap:11px}
  .thumb{width:74px;height:46px;border-radius:8px;background:#000;border:1px solid var(--line);overflow:hidden;flex:none;
         display:grid;place-items:center;color:var(--dim);font-size:20px}
  .thumb img,.thumb video{width:100%;height:100%;object-fit:cover}
  .now .tx{min-width:0}
  .now .tt{font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .now .ty{color:var(--dim);font-size:11.5px;margin-top:2px}
  .row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-size:12px;color:var(--dim)}
  .pill{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:999px;border:1px solid var(--line);font-size:11.5px}
  .pill.aud{color:var(--air);border-color:#1f5e44} .pill.aud0{color:var(--amber);border-color:#5e4a26}
  .pill.pos{color:var(--accent);border-color:#2a3a66}
  .pill.moved{color:var(--robot);border-color:#5a3c8a}
  .acts{display:flex;gap:8px;margin-top:2px}
  a.btn{flex:1;text-align:center;text-decoration:none;color:var(--ink);background:#13203a;border:1px solid #26385e;
        border-radius:9px;padding:8px 10px;font-weight:600;font-size:12.5px}
  a.btn:hover{background:#1a2c4e}
  a.btn.ghost{background:#0e1420;border-color:var(--line);color:var(--dim)}
  .empty{padding:60px 20px;text-align:center;color:var(--dim)}
  footer{padding:10px 20px 30px;color:var(--dim);font-size:11.5px;text-align:center}
  code{color:var(--accent)}
  /* editor de segmentación */
  #segWrap{padding:14px 20px 0}
  #segTable{width:100%;border-collapse:collapse;font-size:13px}
  #segTable th{padding:6px;color:var(--dim);text-align:left;font-weight:600;font-size:11.5px;text-transform:uppercase;letter-spacing:.4px}
  #segTable td{padding:5px 6px;border-bottom:1px solid #131c2b;vertical-align:middle}
  #segWrap select,#segWrap input{background:#0c1320;color:var(--ink);border:1px solid var(--line);border-radius:7px;padding:6px 8px;font:13px -apple-system,Segoe UI,sans-serif}
  #segWrap input[type=number]{width:64px}
  .miniBtn{background:#13203a;border:1px solid #26385e;color:var(--ink);border-radius:6px;padding:4px 8px;cursor:pointer;font-size:12px;margin-left:3px}
  .miniBtn:hover{background:#1a2c4e}
  .modeSel{background:#0c1320;color:var(--ink);border:1px solid var(--line);border-radius:8px;padding:6px 8px;font:12.5px -apple-system,Segoe UI,sans-serif;transition:border-color .3s}
  #segTarget{background:#1a1604;color:#ffd866;border:1px solid #5e4a26;border-radius:8px;padding:7px 10px;font:600 13px -apple-system,Segoe UI,sans-serif}
  /* caja AMARILLA = el player tiene condiciones (segmentación propia) asignadas */
  .card.assigned{border-color:#caa23a;box-shadow:0 0 0 1px #caa23a66, 0 0 22px #caa23a22}
  .card.assigned .ava{border-color:#caa23a;color:#ffd866}
  .badge-cond{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:999px;border:1px solid #5e4a26;color:#ffd866;font-size:11.5px;background:#1a160488}
  /* caja VERDE = match en vivo ("cazado") */
  .card.matched{border-color:var(--air);box-shadow:0 0 0 1px var(--air), 0 0 26px #39d98a44}
  .card.matched .ava{border-color:var(--air);color:var(--air)}
  .badge-match{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:999px;border:1px solid #1f5e44;color:var(--air);font-size:11.5px;background:#0c2018;font-weight:700}
  /* preview de la pieza que se disparará */
  .firePrev{display:flex;align-items:center;gap:9px;margin-top:8px;padding:7px 8px;border-radius:10px;background:#0c1320;border:1px solid var(--line)}
  .firePrev.on{border-color:#1f5e44;background:#0b1a14}
  .firePrev .ft{width:58px;height:36px;border-radius:6px;overflow:hidden;background:#000;display:grid;place-items:center;color:var(--dim);font-size:17px;flex:none}
  .firePrev .ft img,.firePrev .ft video{width:100%;height:100%;object-fit:cover}
  /* control remoto por player (audio/transporte/CLI) */
  .remote{display:flex;align-items:center;gap:6px;margin-top:8px}
  .rbtn{flex:none;width:34px;height:32px;display:grid;place-items:center;background:#13203a;border:1px solid #26385e;border-radius:8px;color:var(--ink);cursor:pointer;font-size:14px}
  .rbtn:hover{background:#1a2c4e}
  .rbtn.flash{background:var(--accent);color:#04110b}
  .rvol{flex:1;min-width:50px;accent-color:var(--air);cursor:pointer}
  .rcli{margin-top:7px;width:100%;background:#0c1320;color:var(--ink);border:1px solid var(--line);border-radius:8px;padding:7px 10px;font:12.5px ui-monospace,Menlo,monospace}
  .rcli::placeholder{color:var(--dim)}
  /* forzar público sin cámara (chico/chica) */
  .force{display:flex;align-items:center;gap:6px;margin-top:7px;flex-wrap:wrap}
  .fbtn{flex:1;min-width:74px;display:inline-flex;align-items:center;justify-content:center;gap:5px;background:#13203a;border:1px solid #26385e;border-radius:8px;color:var(--ink);cursor:pointer;font-weight:600;font-size:12.5px;padding:7px 8px}
  .fbtn:hover{background:#1a2c4e}
  .fbtn.fx{flex:none;width:34px;min-width:0;color:var(--dim)}
  .fbtn.on{background:var(--air);border-color:var(--air);color:#04110b}
  .fbtn.flash{outline:2px solid var(--accent)}
  /* navegador de Stock (modal) */
  #mediaModal{position:fixed;inset:0;z-index:50;background:#060912f2;backdrop-filter:blur(5px);display:none;flex-direction:column;padding:18px 20px}
  #mediaModal .mHd{display:flex;align-items:center;gap:12px;margin-bottom:14px;flex-wrap:wrap}
  #mediaModal h3{margin:0;font-size:18px;white-space:nowrap}
  #mediaSearch{flex:1;min-width:160px;background:#0c1320;color:var(--ink);border:1px solid var(--line);border-radius:9px;padding:9px 12px;font:14px -apple-system,Segoe UI,sans-serif}
  #mediaGrid{flex:1;overflow:auto;display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:12px;align-content:start}
  .mItem{position:relative;background:var(--panel);border:1px solid var(--line);border-radius:12px;overflow:hidden;cursor:pointer;transition:transform .1s,border-color .15s}
  .mItem:hover{transform:translateY(-2px);border-color:#33415e}
  .mItem.on{border-color:var(--air);box-shadow:0 0 0 2px var(--air) inset}
  .mItem.on::after{content:'✓';position:absolute;top:6px;right:6px;width:20px;height:20px;border-radius:50%;background:var(--air);color:#04110b;font:800 13px sans-serif;display:grid;place-items:center;z-index:2}
  .mTh{height:94px;background:#000;display:grid;place-items:center;color:var(--dim);font-size:26px;overflow:hidden}
  .mTh img{width:100%;height:100%;object-fit:cover}
  .mTt{padding:7px 9px 1px;font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .mTy{padding:0 9px 8px;font-size:11px;color:var(--dim)}
  /* Enlaces del menú superior: Alta (registrar equipo) y Parrilla (planificar emisión) */
  .cmsNav{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .cmsNav a{display:inline-flex;align-items:center;gap:5px;padding:6px 11px;border:1px solid var(--line);border-radius:8px;background:#0e1420;color:var(--ink);font:600 12px ui-monospace,monospace;text-decoration:none;white-space:nowrap}
  .cmsNav a:hover{border-color:var(--accent);color:#fff}
  /* Bloque "Playlist asignada" + chip de modo por player */
  .pl{margin-top:7px;border:1px solid var(--line);border-radius:9px;padding:8px 10px;background:#0b121d}
  .plhdr{display:flex;align-items:center;gap:8px;margin-bottom:5px}
  .plmode{font:700 11px ui-monospace,Menlo,monospace;padding:2px 8px;border-radius:999px;border:1px solid var(--line);white-space:nowrap}
  .plmode.conditional{color:var(--amber);border-color:#5a4a1e;background:rgba(255,180,76,.10)}
  .plmode.local{color:var(--accent);border-color:#2a3a66;background:rgba(122,162,255,.10)}
  .plmode.sync{color:var(--air);border-color:#1e5a3a;background:rgba(57,217,138,.10)}
  .plttl{font-size:10.5px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px}
  .plbody{font-size:12px;color:var(--ink)}
  .plhead{font-size:10.5px;color:var(--dim);margin-bottom:3px}
  .plrow{display:flex;gap:6px;align-items:center;padding:2px 0;border-top:1px dashed rgba(255,255,255,.05)}
  .plrow.nb{border-top:0}
  .plc{color:var(--dim);white-space:nowrap;flex:none}
  .pld{font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
  .plm{font:600 10px ui-monospace,monospace;color:var(--dim);border:1px solid var(--line);border-radius:5px;padding:0 5px;margin-left:auto;flex:none}
  /* Estado de descarga (pseudo-streaming): qué tiene bajado cada player */
  .dl{margin-top:7px;border:1px solid var(--line);border-radius:9px;padding:8px 10px;background:#0b121d}
  .dlhdr{display:flex;align-items:center;gap:4px;font-size:11.5px;color:var(--dim);margin-bottom:6px;flex-wrap:wrap}
  .dlhdr b{color:var(--ink);font-weight:700}
  .dlc{color:var(--dim)}
  .dlok{color:var(--air);font-weight:700}
  .dlbar{height:6px;background:#0d1f2b;border:1px solid var(--line);border-radius:99px;overflow:hidden}
  .dlbar>i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--air));border-radius:99px;transition:width .5s}
  .dldl{font:600 10.5px ui-monospace,monospace;color:var(--amber);margin-top:5px;display:flex;flex-wrap:wrap;gap:9px}
  /* Fichas contraíbles (para flotas grandes) + botón global en la nav */
  .cmsNav button{display:inline-flex;align-items:center;gap:5px;padding:6px 11px;border:1px solid var(--line);border-radius:8px;background:#0e1420;color:var(--ink);font:600 12px ui-monospace,monospace;cursor:pointer;white-space:nowrap}
  .cmsNav button:hover{border-color:var(--accent);color:#fff}
  .card .top{cursor:pointer;user-select:none}
  .cmode{flex:none;font-size:13px;line-height:1;width:24px;height:24px;display:grid;place-items:center;border:1px solid var(--line);border-radius:8px;background:#0c1320}
  .cmode.conditional{border-color:#5a4a1e} .cmode.local{border-color:#2a3a66} .cmode.sync{border-color:#1e5a3a}
  .collChev{flex:none;color:var(--dim);font-size:11px;transition:transform .15s;width:14px;text-align:center}
  .card.collapsed .collChev{transform:rotate(-90deg)}
  .card.collapsed .body{display:none}
  .card.collapsed .top{border-bottom:0}
  /* simulador XPL */
  #simWrap{padding:12px 20px 0}
  .simCard{background:linear-gradient(180deg,var(--panel2),var(--panel));border:1px solid var(--line);border-radius:16px;overflow:hidden}
  .simGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;padding:14px 16px}
  .simF{background:#0b121d;border:1px solid var(--line);border-radius:10px;padding:8px 11px}
  .simF>label{display:block;font-size:10.5px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
  .simF select{width:100%}
  .simF input[type=range]{width:100%;accent-color:var(--accent);cursor:pointer}
  .simF .val{font:700 11.5px ui-monospace,monospace;color:var(--accent)}
  .simToggle{display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none;font-size:12.5px}
  .simToggle .sw{width:34px;height:20px;border-radius:99px;background:#1a2436;border:1px solid var(--line);position:relative;transition:.15s;flex:none}
  .simToggle .sw::after{content:'';position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;background:#5b6b85;transition:.15s}
  .simToggle.on .sw{background:#16432c;border-color:#1f5e44}
  .simToggle.on .sw::after{left:16px;background:var(--air)}
  .simOut{display:flex;align-items:center;gap:14px;padding:14px 16px;border-top:1px solid var(--line);background:#0a1018}
  .simOut .ft{width:104px;height:64px;border-radius:9px;overflow:hidden;background:#000;display:grid;place-items:center;color:var(--dim);font-size:26px;flex:none;border:1px solid var(--line)}
  .simOut .ft img,.simOut .ft video{width:100%;height:100%;object-fit:cover}
  .simHitlbl{font:700 11.5px ui-monospace,monospace;padding:3px 9px;border-radius:999px;white-space:nowrap}
  .simHitlbl.hit{color:var(--air);border:1px solid #1f5e44;background:#0c2018}
  .simHitlbl.def{color:#ffd866;border:1px solid #5e4a26;background:#1a160488}
  tr.simhit td{background:rgba(57,217,138,.09)}
  tr.simhit td:first-child{box-shadow:inset 3px 0 0 var(--air)}
  .pickCond.has{border-color:#5a4a1e;color:#ffd866}
  /* modal de condiciones extra (clima/día) por regla */
  #condModal{position:fixed;inset:0;z-index:55;background:#060912f2;backdrop-filter:blur(5px);display:none;align-items:center;justify-content:center;padding:18px}
  .condBox{background:var(--panel);border:1px solid var(--line);border-radius:16px;max-width:540px;width:100%;padding:18px 20px}
  .condBox h3{margin:0 0 3px;font-size:17px}
  .condList{display:flex;flex-direction:column;gap:8px;margin:14px 0 10px}
  .condItem{display:flex;align-items:center;gap:9px;background:#0b121d;border:1px solid var(--line);border-radius:10px;padding:8px 10px;flex-wrap:wrap}
  .condItem .cf{flex:1;min-width:120px;font-size:13px}
  .condItem select,.condItem input{background:#0c1320;color:var(--ink);border:1px solid var(--line);border-radius:7px;padding:5px 8px;font:13px -apple-system,Segoe UI,sans-serif}
  .cBtnCol{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:7px}
  .cChip{background:#0e1420;border:1px solid var(--line);border-radius:8px;padding:7px 9px;color:var(--ink);font-size:12px;cursor:pointer;text-align:left}
  .cChip:hover{border-color:var(--accent)}
  .condBtns{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}
  /* historial de "cazados" */
  #hitsWrap{padding:12px 20px 0}
  .hitsCard{background:linear-gradient(180deg,var(--panel2),var(--panel));border:1px solid var(--line);border-radius:16px;overflow:hidden}
  .hitsList{max-height:240px;overflow:auto;padding:6px 8px 8px}
  .hitRow{display:flex;align-items:center;gap:10px;padding:7px 9px;border-radius:9px}
  .hitRow:hover{background:#0b121d}
  .hitRow .ht{font:600 11px ui-monospace,monospace;color:var(--dim);white-space:nowrap;flex:none;width:62px}
  .hitRow .hp{font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:none;max-width:140px}
  .hitRow .harrow{color:var(--dim);flex:none}
  .hitRow .hpiece{color:var(--air);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0;flex:1}
  .hitRow .hslot{font:600 10px ui-monospace,monospace;color:var(--dim);border:1px solid var(--line);border-radius:5px;padding:1px 6px;flex:none}
  .hitsEmpty{padding:22px 14px;text-align:center;color:var(--dim);font-size:12.5px}
</style>
</head>
<body>
<header>
  <div>
    <div class="brand">Admira · <b>CMS</b></div>
    <div class="sub">Control de flota — dispositivos conectados y qué emiten</div>
  </div>
  <div class="spacer"></div>
  <nav class="cmsNav" aria-label="Admira">
    <button id="collapseAll" type="button" title="Contraer / expandir todas las fichas">▾ Contraer</button>
    <a href="/condicional.html">🎯 Condicional</a>
    <a href="/canal.html" target="_blank" rel="noopener">📺 Canal</a>
    <a href="/alta.html">➕ Alta</a>
    <a href="https://www.xpaceos.com/control/" target="_blank" rel="noopener">📅 Parrilla</a>
  </nav>
  <div class="live"><span class="dot"></span><span id="liveTxt">en vivo</span></div>
</header>

<div class="kpis">
  <div class="kpi accent"><div class="n" id="k-total">—</div><div class="l">dispositivos</div></div>
  <div class="kpi air"><div class="n" id="k-online">—</div><div class="l">emitiendo ahora</div></div>
  <div class="kpi amber"><div class="n" id="k-aud">—</div><div class="l">con audiencia</div></div>
  <div class="kpi"><div class="n" id="k-robot">—</div><div class="l">móviles / robot</div></div>
</div>

<div class="grid" id="grid"><div class="empty">Cargando flota…</div></div>
<footer>Auto-refresco cada 10 s · fuente: <code>omnipublicity-api</code> (flota) + <code>signage/now</code> (emisión) · <span id="stamp"></span></footer>

<script src="xpl-runtime.js?v=1"></script>
<script>
const FLEET   = 'https://omnipublicity-api.csilvasantin.workers.dev/locations?selfreg=1';
const SIGNAGE = 'https://api.admira.store/signage/now?screen=';
const CACHEAPI= 'https://api.admira.store/screen/cache?screen=';   // estado de descarga (pseudo-streaming)
const CANAL   = 'https://admira.tv/canal.html';
const ONLINE_MS = 180000;            // signage/now fresco < 180 s = en antena
// Estado de fichas CONTRAÍDAS (persiste en localStorage; sobrevive al re-render cada 10s).
const COLLKEY='cms_collapsed';
let COLLAPSED=new Set((()=>{try{return JSON.parse(localStorage.getItem(COLLKEY)||'[]')}catch(_){return[]}})());
function saveColl(){try{localStorage.setItem(COLLKEY,JSON.stringify([...COLLAPSED]))}catch(_){}}
const $ = id => document.getElementById(id);
const esc = s => String(s==null?'':s).replace(/[<>&"]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c]));
const ageTxt = ms => { const s=Math.max(0,Math.round(ms/1000)); return s<60?s+'s':s<3600?Math.round(s/60)+'min':Math.round(s/3600)+'h'; };

function canalUrl(d){
  const u = new URL(CANAL);
  u.searchParams.set('screen', d.screen||'');
  u.searchParams.set('circuit', d.id||'');
  u.searchParams.set('clean','1'); u.searchParams.set('mode','conditional');
  if(d.orientation==='portrait') u.searchParams.set('format','9:16');
  if(d.deviceType==='robot') u.searchParams.set('mobile','1');
  return u.toString();
}
function thumbHtml(it){
  if(!it) return '<span>—</span>';
  if(it.type==='image'||it.type==='animation') return '<img src="'+esc(it.url||'')+'" alt="">';
  if(it.type==='video') return it.url?'<video src="'+esc(it.url)+'" muted></video>':'▶';
  return it.type==='audio'?'♪':'▦';
}
function audPill(aud){
  if(!aud||!aud.cam) return '<span class="pill">📷 sin cámara</span>';
  if(!aud.faces) return '<span class="pill aud0">👁 0 · sin público</span>';
  const g = aud.gender==='f'?'♀':aud.gender==='m'?'♂':'';
  return '<span class="pill aud">👥 '+aud.faces+(g?(' · '+g):'')+(aud.age?(' '+esc(aud.age)):'')+'</span>';
}

async function fetchNow(screen){
  if(!screen) return null;
  try{ const r=await fetch(SIGNAGE+encodeURIComponent(screen),{cache:'no-store'}); if(!r.ok) return null;
       const d=await r.json(); const it=d.item||d||null;
       if(it && typeof it==='object' && d.ip) it._ip=d.ip;   // IP pública del player (capturada por el worker en el POST)
       return it; }catch(_){ return null; }
}
// estado de pseudo-streaming de un player: qué piezas tiene DESCARGADAS a disco
async function fetchCache(screen){
  if(!screen) return null;
  try{ const r=await fetch(CACHEAPI+encodeURIComponent(screen),{cache:'no-store'}); if(!r.ok) return null;
       const d=await r.json(); return (d&&d.cache)?d.cache:null; }catch(_){ return null; }
}

// franja Madrid actual (igual que el canal) para evaluar reglas de tiempo
function curSlot(){ let h=12; try{ h=+new Date().toLocaleString('en-US',{hour:'2-digit',hour12:false,timeZone:'Europe/Madrid'}); }catch(_){ h=new Date().getHours(); } return h<12?'manana':h<16?'mediodia':h<21?'tarde':'noche'; }
// segmento actual a partir de la audiencia que publica el player (signage/now)
function audSeg(aud){ const a=aud||{}; const f=a.faces||0; return { gender:f?(a.gender==='m'?'m':a.gender==='f'?'f':null):null, age:f?(a.age||null):null, count:f, slot:curSlot() }; }
// mismo matchMatrix que el canal: 1ª regla que casa (o default)
function matchRule(matrix,seg){ for(const r of (matrix.rules||[])){ const mc=(r.minCount==null?1:r.minCount); if(mc>seg.count) continue;
  if(r.gender&&r.gender!=='any'&&r.gender!==seg.gender) continue; if(r.age&&r.age!=='any'&&r.age!==seg.age) continue;
  if(r.slot&&r.slot!=='any'&&r.slot!==seg.slot) continue; return {rule:r,matched:true}; }
  return {rule:matrix.default||{},matched:false}; }
function assetById(id){ return STOCK_ITEMS.find(x=>x.id===id)||null; }
function mediaThumb(a){ if(!a) return '🎬'; if(a.type==='image'||a.type==='animation') return '<img src="'+esc(a.url)+'" alt="">'; if(a.thumbnail) return '<img src="'+esc(a.thumbnail)+'" alt="">'; return a.type==='video'?'▶':'♪'; }
function condText(r){
  // Regla "atemporal": catch-all sin filtros (carrusel completo, no atada a público ni hora).
  const allAny=(!r.gender||r.gender==='any')&&(!r.age||r.age==='any')&&(!r.slot||r.slot==='any');
  if(r.id==='atemporal' || (allAny && r.minCount===0 && !(r.assets&&r.assets.length))) return '🔁 atemporal · carrusel';
  const G={any:'cualquier género',m:'♂ hombre',f:'♀ mujer'}, A={any:'cualquier edad',nino:'niño',joven:'joven',adulto:'adulto',senior:'senior',vejez:'vejez'}, S={any:'cualquier hora',manana:'mañana',mediodia:'mediodía',tarde:'tarde',noche:'noche'};
  const p=(r.minCount===0)?'sin cámara':''; return [G[r.gender||'any'],A[r.age||'any'],S[r.slot||'any']].concat(p?[p]:[]).join(' · '); }

async function load(){
  let devs=[];
  try{ const r=await fetch(FLEET,{cache:'no-store'}); const d=await r.json(); devs=(d.locations||d||[]).filter(x=>x&&x.id); }
  catch(_){ $('liveTxt').textContent='sin conexión con la flota'; return; }
  // ordena: robot/móvil primero, luego por nombre
  devs.sort((a,b)=> (b.deviceType==='robot')-(a.deviceType==='robot') || String(a.name||a.id).localeCompare(String(b.name||b.id)));
  // players con segmentación PROPIA asignada (caja amarilla)
  let ASSIGNED=new Set();
  try{ const a=await fetch(SEG_API+'/assigned?t='+Date.now(),{cache:'no-store'}).then(r=>r.json()); ASSIGNED=new Set(a.assigned||[]); }catch(_){}
  // segmentación propia de cada player asignado (para evaluar el match y previsualizar la pieza)
  const segByPlayer={};
  await Promise.all([...ASSIGNED].map(id=>fetch(SEG_API+'?target='+encodeURIComponent(id)+'&t='+Date.now(),{cache:'no-store'}).then(r=>r.json()).then(d=>{segByPlayer[id]=d;}).catch(()=>{})));
  // matriz GLOBAL (la usan los players condicionales sin reglas propias) → para pintar su playlist
  let GLOBAL_SEG={rules:[],default:{}}; try{ GLOBAL_SEG=await fetch(SEG_API+'?target=all&t='+Date.now(),{cache:'no-store'}).then(r=>r.json()); }catch(_){}
  const nows = await Promise.all(devs.map(d=>fetchNow(d.screen)));
  const dlStates = await Promise.all(devs.map(d=>fetchCache(d.screen)));   // descargas por player
  const now = Date.now();
  let online=0, withAud=0, robots=0;
  const cards = devs.map((d,i)=>{
    const it = nows[i];
    const isOn = it && it.ts && (now - it.ts) < ONLINE_MS;
    if(isOn) online++;
    if(it && it.aud && it.aud.faces>0) withAud++;
    const isRobot = d.deviceType==='robot'; if(isRobot) robots++;
    const startedAgo = (it&&it.startedAt)? ('hace '+ageTxt(now-it.startedAt)) : '';
    const moved = d.movedAt ? '<span class="pill moved" title="posición actualizada">📍 movido '+ageTxt(now-d.movedAt*1000)+'</span>' : '';
    const hasCond = ASSIGNED.has(d.id);   // tiene segmentación propia asignada → caja amarilla
    // evalúa el match en vivo (audiencia actual del player vs sus reglas) y prepara el preview
    let matched=false, firePrev='';
    if(hasCond && segByPlayer[d.id]){
      const mtx=segByPlayer[d.id], seg=audSeg(it&&it.aud), mr=matchRule(mtx,seg);
      matched=mr.matched;
      const rule = matched ? mr.rule : ((mtx.rules&&mtx.rules[0]) || mtx.default || {});
      const asset = (rule.assets&&rule.assets[0]) ? assetById(rule.assets[0]) : null;
      const fireTxt = asset ? (asset.title||asset.id) : ('tema: '+(rule.tag||rule.category||'auto'));
      firePrev = '<div class="firePrev '+(matched?'on':'')+'">'+
          '<div class="ft">'+(asset?mediaThumb(asset):'🎬')+'</div>'+
          '<div style="min-width:0">'+
            '<div style="font-size:11px;color:'+(matched?'var(--air)':'#ffd866')+'">'+(matched?'✅ CAZADO':'🎯 se disparará')+' · '+esc(condText(rule))+'</div>'+
            '<div style="font-size:12.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(String(fireTxt).slice(0,42))+'</div>'+
          '</div></div>';
    }
    const cardCls = matched?'matched':(hasCond?'assigned':'');
    const cmode = d.mode||'conditional', CMICON={conditional:'🎯',local:'📍',sync:'🛰'};
    return `<div class="card ${cardCls}${COLLAPSED.has(d.id)?' collapsed':''}" data-id="${esc(d.id)}">
      <div class="top" title="Clic para contraer / expandir">
        <div class="ava ${isRobot?'robot':''}">${isRobot?'🤖':(d.orientation==='landscape'?'🖥️':'📱')}</div>
        <div style="min-width:0;flex:1">
          <div class="nm">${esc(d.name||d.id)}</div>
          <div class="meta">${esc(d.id)} · ${isRobot?'robot móvil':'pantalla'} · ${esc(d.orientation||'portrait')}${d.device?(' · 💻 '+esc(d.device)):''}${(it&&it._ip)?(' · 🌐 '+esc(it._ip)):''}</div>
        </div>
        <span class="cmode ${cmode}" title="${MODE_LBL[cmode]}">${CMICON[cmode]}</span>
        <div class="st ${isOn?'on':'off'}"><span class="d"></span>${isOn?'Emitiendo':'sin señal'}</div>
        <span class="collChev" aria-hidden="true">▾</span>
      </div>
      <div class="body">
        <div class="now">
          <div class="thumb">${isOn?thumbHtml(it):'—'}</div>
          <div class="tx">
            <div class="tt">${isOn?esc(it.title||it.id||'emitiendo'):'<span style="color:var(--dim)">no está emitiendo</span>'}</div>
            <div class="ty">${isOn?(esc(it.type||'')+(startedAgo?(' · '+startedAgo):'')):(it&&it.ts?('última señal hace '+ageTxt(now-it.ts)):'sin registro de emisión')}</div>
          </div>
        </div>
        <div class="row">
          ${isOn?audPill(it.aud):''}
          ${d.addr?('<span class="pill pos" title="'+esc(d.addr)+'">📍 '+esc(String(d.addr).split('·')[0].trim())+'</span>'):''}
          ${moved}
          ${matched?'<span class="badge-match" title="el público actual cumple una condición">✅ ¡cazado!</span>':(hasCond?'<span class="badge-cond" title="tiene segmentación propia asignada">🎯 condiciones propias</span>':'')}
        </div>
        ${firePrev}
        <div class="row" style="gap:7px;align-items:center;margin-top:2px">
          <span class="meta" style="flex:none">Modo de emisión</span>
          <select class="modeSel" data-id="${esc(d.id)}" style="flex:1">
            ${['conditional','local','sync'].map(mo=>'<option value="'+mo+'"'+((d.mode||'conditional')===mo?' selected':'')+'>'+MODE_LBL[mo]+'</option>').join('')}
          </select>
        </div>
        ${(()=>{ const mode=d.mode||'conditional'; const ML={conditional:'🎯 Condicional',local:'📍 Local',sync:'🛰 Sincro'};
          let body;
          if(mode==='sync') body='<div class="plrow nb"><span class="pld">Máster de admira.tv</span><span class="plc">· toda la red en sincronía</span></div>';
          else if(mode==='local') body='<div class="plrow nb"><span class="pld">Loop del Stock de Pixeria</span><span class="plc">· programación local</span></div>';
          else { const own=(hasCond&&segByPlayer[d.id])?segByPlayer[d.id]:null; const mtx=own||(typeof GLOBAL_SEG!=='undefined'?GLOBAL_SEG:null)||{rules:[],default:{}}; const rs=mtx.rules||[];
            const head='<div class="plhead">'+rs.length+' '+(own?(rs.length===1?'regla propia':'reglas propias'):(rs.length===1?'regla global':'reglas globales'))+'</div>';
            const rows=rs.slice(0,3).map(r=>{
              const carousel=r.id==='atemporal' || ((!r.gender||r.gender==='any')&&(!r.age||r.age==='any')&&(!r.slot||r.slot==='any')&&r.minCount===0&&!(r.assets&&r.assets.length));
              const a=(r.assets&&r.assets[0])?assetById(r.assets[0]):null;
              const dst=a?(a.title||a.id):(carousel?'todo el Stock':('tema '+(r.tag||r.category||'auto')));
              const med=carousel?'':('<span class="plm">'+esc(r.medio||'any')+'</span>');
              return '<div class="plrow"><span class="plc">'+esc(condText(r))+'</span><span class="plc">→</span><span class="pld">'+esc(String(dst).slice(0,26))+'</span>'+med+'</div>'; }).join('');
            const more=rs.length>3?'<div class="plrow" style="opacity:.55">+'+(rs.length-3)+' más…</div>':'';
            const dflt='<div class="plrow"><span class="plc">por defecto</span><span class="plc">→</span><span class="pld">'+esc((mtx.default&&(mtx.default.tag||mtx.default.category))||'atraer')+'</span></div>';
            body=head+rows+more+dflt;
          }
          return '<div class="pl"><div class="plhdr"><span class="plmode '+mode+'">'+ML[mode]+'</span><span class="plttl">Playlist asignada</span></div><div class="plbody">'+body+'</div></div>';
        })()}
        ${(()=>{ const cc=dlStates[i]; if(!cc) return '';
          const total=cc.total||0, ready=(cc.readyCount!=null?cc.readyCount:(cc.ready||[]).length);
          const pct=total?Math.min(100,Math.round(ready/total*100)):0;
          const dling=(cc.downloading||[]);
          const mb=cc.bytes?((cc.bytes/1048576).toFixed(cc.bytes>10485760?0:1)+' MB'):'';
          const fresh=cc.at?('hace '+ageTxt(now-cc.at)):'';
          const full=total>0&&ready>=total&&!dling.length;
          const dlrows=dling.slice(0,4).map(x=>'<span>⏳ …'+esc(String(x.id).slice(-6))+' '+(x.pct|0)+'%</span>').join('');
          return '<div class="dl">'+
            '<div class="dlhdr"><span>📥</span><b>'+ready+'/'+total+'</b>&nbsp;descargado'+(full?' <span class="dlok">· listo ✓</span>':'')+(mb?(' <span class="dlc">· '+mb+'</span>'):'')+(fresh?(' <span class="dlc">· '+fresh+'</span>'):'')+'</div>'+
            '<div class="dlbar"><i style="width:'+pct+'%"></i></div>'+
            (dlrows?('<div class="dldl">'+dlrows+'</div>'):'')+
          '</div>';
        })()}
        <div class="acts">
          <a class="btn" href="${esc(canalUrl(d))}" target="_blank" rel="noopener">▶ Abrir canal</a>
          <a class="btn ghost" href="${(d.coords&&d.coords.length===2)?('https://www.admira.app/?lng='+d.coords[0]+'&lat='+d.coords[1]+'&label='+encodeURIComponent(d.name||d.id)):'https://www.admira.app/'}" target="_blank" rel="noopener" title="ver este punto en el mapa">🗺 Mapa</a>
        </div>
        <div class="remote" data-id="${esc(d.id)}" title="control remoto del player">
          <button class="rbtn" data-cmd="prev" title="anterior">⏮</button>
          <button class="rbtn" data-cmd="audiooff" title="silenciar (audio off)">🔇</button>
          <input class="rvol" type="range" min="0" max="100" value="60" title="volumen remoto">
          <button class="rbtn" data-cmd="audioon" title="sonido (audio on)">🔊</button>
          <button class="rbtn" data-cmd="next" title="siguiente">⏭</button>
        </div>
        <div class="force" data-id="${esc(d.id)}" title="forzar público sin cámara → dispara el condicional">
          <span class="meta" style="flex:none">Forzar:</span>
          <button class="fbtn" data-aud="m" title="como si hubiera un hombre delante">👨 Chico</button>
          <button class="fbtn" data-aud="f" title="como si hubiera una mujer delante">👩 Chica</button>
          <button class="fbtn fx" data-aud="x" title="volver a la cámara real">✕</button>
        </div>
        <input class="rcli" data-id="${esc(d.id)}" placeholder="/comando remoto (p.ej. tag musica, mute 1)…">
      </div>
    </div>`;
  });
  $('grid').innerHTML = cards.length?cards.join(''):'<div class="empty">No hay dispositivos auto-registrados todavía. Da de alta uno en <code>admira.tv/alta.html</code>.</div>';
  $('k-total').textContent=devs.length; $('k-online').textContent=online;
  $('k-aud').textContent=withAud; $('k-robot').textContent=robots;
  $('stamp').textContent='actualizado '+new Date().toLocaleTimeString('es-ES');
  // reproduce los thumbs de vídeo (preview en bucle)
  document.querySelectorAll('.thumb video').forEach(v=>{ v.loop=true; v.muted=true; v.play&&v.play().catch(()=>{}); });
}
load(); setInterval(load, 10000);

// ── Fichas contraíbles: clic en el header (.top) contrae/expande; estado persistido ──
$('grid').addEventListener('click', e=>{
  if(e.target.closest('.modeSel,.remote,.acts,a,button,select,input')) return; // no en controles
  const top=e.target.closest('.card>.top'); if(!top) return;
  const card=top.closest('.card'), id=card&&card.dataset.id; if(!id) return;
  if(COLLAPSED.has(id)) COLLAPSED.delete(id); else COLLAPSED.add(id);
  saveColl(); card.classList.toggle('collapsed', COLLAPSED.has(id));
});
// Botón global: contraer todas / expandir todas
const collAllBtn=document.getElementById('collapseAll');
if(collAllBtn) collAllBtn.onclick=()=>{
  const ids=[...document.querySelectorAll('.card')].map(c=>c.dataset.id).filter(Boolean);
  const allColl = ids.length && ids.every(id=>COLLAPSED.has(id));
  ids.forEach(id=> allColl ? COLLAPSED.delete(id) : COLLAPSED.add(id));
  saveColl();
  document.querySelectorAll('.card').forEach(c=>c.classList.toggle('collapsed', COLLAPSED.has(c.dataset.id)));
  collAllBtn.textContent = allColl ? '▾ Contraer' : '▸ Expandir';
};

/* Desplegable de MODO por dispositivo → controla el player en remoto. */
$('grid').addEventListener('change', async e=>{
  const sel=e.target.closest('.modeSel');
  if(sel){
    const id=sel.dataset.id, mode=sel.value; sel.disabled=true;
    try{ const r=await fetch(MODE_API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id,mode})});
         const d=await r.json(); sel.style.borderColor=(d&&d.ok)?'#1f5e44':'#5e2630'; }
    catch(_){ sel.style.borderColor='#5e2630'; }
    sel.disabled=false; setTimeout(()=>{ sel.style.borderColor=''; },1600); return;
  }
  const vol=e.target.closest('.rvol');   // slider de volumen → comando volume
  if(vol){ const id=vol.closest('.remote').dataset.id; sendCmd(id,'volume '+vol.value); }
});

/* ── CONTROL REMOTO: el CMS encola comandos al player (worker /locations/cmd) ── */
const CMD_API='https://omnipublicity-api.csilvasantin.workers.dev/locations/cmd';
async function sendCmd(id,cmd){
  if(!id||!cmd) return false;
  try{ const r=await fetch(CMD_API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id,cmd})}); const d=await r.json(); return !!(d&&d.ok); }
  catch(_){ return false; }
}
$('grid').addEventListener('click', e=>{
  // forzar público (chico/chica/limpiar) → comando forcecam al player
  const f=e.target.closest('.fbtn');
  if(f){ const wrap=f.closest('.force'); const id=wrap.dataset.id, aud=f.dataset.aud;
    sendCmd(id, 'forcecam '+aud);
    wrap.querySelectorAll('.fbtn:not(.fx)').forEach(x=>x.classList.toggle('on', x===f && aud!=='x'));
    f.classList.add('flash'); setTimeout(()=>f.classList.remove('flash'),450); return; }
  const b=e.target.closest('.rbtn'); if(!b) return;
  const id=b.closest('.remote').dataset.id;
  sendCmd(id, b.dataset.cmd);
  b.classList.add('flash'); setTimeout(()=>b.classList.remove('flash'),400);
});
$('grid').addEventListener('keydown', e=>{
  const cli=e.target.closest('.rcli'); if(!cli||e.key!=='Enter') return;
  const cmd=cli.value.trim(); if(!cmd) return;
  sendCmd(cli.dataset.id, cmd.replace(/^\//,''));   // admite con o sin '/'
  cli.value=''; cli.placeholder='✓ enviado'; setTimeout(()=>{ cli.placeholder='/comando remoto…'; },1500);
});

/* ── Stock para el preview de "cazado" en las fichas (amarillo/verde) ── */
const SEG_API = 'https://omnipublicity-api.csilvasantin.workers.dev/segmentation';
const MODE_API='https://omnipublicity-api.csilvasantin.workers.dev/locations/mode';
const MODE_LBL={conditional:'Condicional · cámara/contexto',local:'Local · su programación',sync:'Sincro · lo que manda admira.tv'};
let STOCK_ITEMS=[];
async function loadStockVocab(){
  try{ const r=await fetch('https://api.admira.store/stock/list?limit=300',{cache:'no-store'}); const d=await r.json();
    STOCK_ITEMS=(d.items||[]).filter(it=>['image','video','animation'].includes(it.type)); }catch(_){}
}
loadStockVocab();
</script>
